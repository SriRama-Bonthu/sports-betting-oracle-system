version: '3.8'

services:
  hardhat:
    build: ./blockchain
    container_name: sports-hardhat
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' | grep -q result"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  oracle:
    build: ./oracle-service
    container_name: sports-oracle
    env_file:
      - ./oracle-service/.env
    ports:
      - "3001:3001"
    depends_on:
      hardhat:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    container_name: sports-frontend
    environment:
      - VITE_ORACLE_SERVICE_URL=http://localhost:3001
      - VITE_DEFAULT_BET_ETH=0.01
    ports:
      - "5173:5173"
    depends_on:
      oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 12
